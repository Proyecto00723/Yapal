<script src="../js/auth.js"></script>
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Plataforma de Cursos</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Estilos -->
    <link rel="stylesheet" href="css/estilos.css">

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #141414;
            color: white;
        }

        header {
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
        }

        .contenedor {
            padding: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }

        .curso {
            background-color: #1f1f1f;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.3s;
        }

        .curso:hover {
            transform: scale(1.05);
        }

        .curso img {
            width: 100%;
            height: 240px;
            object-fit: cover;
        }

        .curso-info {
            padding: 10px;
        }

        .curso-info h3 {
            margin: 0;
            font-size: 16px;
        }

        .curso-info p {
            font-size: 13px;
            color: #b3b3b3;
        }

        .curso-info a {
            display: block;
            margin-top: 10px;
            text-align: center;
            padding: 8px;
            background-color: #e50914;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-size: 14px;
        }

        .curso-info a:hover {
            background-color: #f40612;
        }
    </style>
</head>
<body>

<header>
    🎓 Plataforma de Cursos
</header>

<div class="contenedor">
    <h2>Cursos disponibles</h2>

    <div class="grid">

        <!-- Curso 1 -->
        <div class="curso">
            <img src="img/algebra1.jpg" alt="Álgebra 1">
            <div class="curso-info">
                <h3>Álgebra 1</h3>
                <p>Curso básico de álgebra paso a paso.</p>
                <a href="cursos/algebra1.html">Ver curso</a>
            </div>
        </div>

        <!-- Curso 2 -->
        <div class="curso">
            <img src="img/geometria.jpg" alt="Geometría">
            <div class="curso-info">
                <h3>Geometría</h3>
                <p>Figuras, áreas y razonamiento lógico.</p>
                <a href="cursos/geometria.html">Ver curso</a>
            </div>
        </div>

        <!-- Curso 3 -->
        <div class="curso">
            <img src="img/excel.jpg" alt="Excel Básico">
            <div class="curso-info">
                <h3>Excel Básico</h3>
                <p>Aprende Excel desde cero.</p>
                <a href="cursos/excel.html">Ver curso</a>
            </div>
        </div>

    </div>
</div>

</body>
</html>
