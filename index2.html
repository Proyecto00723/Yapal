<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Vision Pro - Visor Inteligente</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #reader {
            width: 100% !important;
            border: none !important;
            border-radius: 1rem;
            overflow: hidden;
        }
        #reader__scan_region { background: #000; }
        button { transition: all 0.2s; }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans overflow-hidden">

    <!-- Pantalla Principal de Escaneo -->
    <div id="scanner-screen" class="flex flex-col items-center justify-center min-h-screen p-4">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">
                QR Vision Pro
            </h1>
            <p class="text-slate-400 mt-2">Escaneo automático de interfaz</p>
        </header>

        <div class="relative w-full max-w-md bg-slate-800 p-2 rounded-2xl shadow-2xl border border-slate-700">
            <div id="reader"></div>
        </div>

        <div id="status-message" class="mt-6 text-sm text-slate-500 text-center max-w-xs">
            Iniciando visor...
        </div>

        <button id="retry-btn" onclick="startScanner()" class="hidden mt-4 px-6 py-2 bg-blue-600 hover:bg-blue-500 rounded-full font-medium shadow-lg">
            Reintentar Cámara
        </button>
    </div>

    <!-- Pantalla del Visor (Iframe) -->
    <div id="viewer-screen" class="hidden fixed inset-0 bg-white z-50 flex flex-col">
        <nav class="bg-slate-900 p-3 flex items-center justify-between shadow-lg">
            <button onclick="window.closeViewer()" class="flex items-center text-blue-400 hover:text-blue-300">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                </svg>
                Escanear otro
            </button>
            <div id="safe-badge" class="px-3 py-1 bg-green-900/30 text-green-400 text-[10px] uppercase tracking-widest rounded-full border border-green-800/50">
                Interfaz Segura
            </div>
            <button id="external-link" class="p-2 text-slate-400 hover:text-white" title="Abrir en Chrome">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                </svg>
            </button>
        </nav>
        
        <div class="flex-grow relative bg-white">
            <div id="loading-spinner" class="absolute inset-0 flex items-center justify-center bg-white z-10">
                <div class="flex flex-col items-center p-6 text-center">
                    <div class="animate-spin rounded-full h-12 w-12 border-4 border-blue-500 border-t-transparent mb-4"></div>
                    <p class="text-slate-600 font-medium">Cargando interfaz externa...</p>
                    <p class="text-slate-400 text-xs mt-2 max-w-[200px]">Si la página no carga, es posible que el sitio no permita visualización interna.</p>
                </div>
            </div>
            <iframe id="content-frame" class="w-full h-full border-none" src="" onload="window.hideLoader()"></iframe>
        </div>
    </div>

    <script>
        // Funciones Globales para Iframe
        window.hideLoader = function() {
            const loader = document.getElementById('loading-spinner');
            if (loader) loader.classList.add('hidden');
        };

        window.closeViewer = function() {
            document.getElementById('viewer-screen').classList.add('hidden');
            document.getElementById('scanner-screen').classList.remove('hidden');
            document.getElementById('content-frame').src = "";
            startScanner();
        };

        let html5QrCode;
        const retryBtn = document.getElementById('retry-btn');
        const statusMessage = document.getElementById('status-message');

        function onScanSuccess(decodedText) {
            let finalUrl = decodedText.trim();
            
            // Corregir URL si no tiene protocolo (evita el error 404 de Netlify)
            if (!finalUrl.startsWith('http://') && !finalUrl.startsWith('https://')) {
                finalUrl = 'https://' + finalUrl;
            }

            // Intentar abrir en el visor
            openInViewer(finalUrl);
        }

        function openInViewer(url) {
            if (html5QrCode && html5QrCode.isScanning) {
                html5QrCode.stop().then(() => {
                    showViewer(url);
                }).catch(() => showViewer(url));
            } else {
                showViewer(url);
            }
        }

        function showViewer(url) {
            document.getElementById('scanner-screen').classList.add('hidden');
            document.getElementById('viewer-screen').classList.remove('hidden');
            document.getElementById('loading-spinner').classList.remove('hidden');
            
            const frame = document.getElementById('content-frame');
            const externalBtn = document.getElementById('external-link');
            
            // Configuramos el botón externo por si el iframe falla (404 o bloqueo)
            externalBtn.onclick = () => window.open(url, '_blank');
            
            frame.src = url;
        }

        async function startScanner() {
            try {
                if (html5QrCode && html5QrCode.isScanning) {
                    await html5QrCode.stop().catch(() => {});
                }

                retryBtn.classList.add('hidden');
                statusMessage.innerText = "Buscando cámara...";
                statusMessage.classList.remove('text-red-400');
                
                html5QrCode = new Html5Qrcode("reader");
                
                await html5QrCode.start(
                    { facingMode: "environment" }, 
                    { fps: 20, qrbox: { width: 250, height: 250 } }, 
                    onScanSuccess
                );
                
                statusMessage.innerText = "Listo. Apunte a un código QR.";
            } catch (err) {
                console.error(err);
                retryBtn.classList.remove('hidden');
                statusMessage.innerText = "Error de acceso. Verifique permisos o si otra app usa la cámara.";
                statusMessage.classList.add('text-red-400');
            }
        }

        window.addEventListener('DOMContentLoaded', startScanner);
    </script>
</body>
</html>
