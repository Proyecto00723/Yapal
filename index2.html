<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>QR Pro System</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #1e1e2f;
    color: white;
    text-align: center;
}

/* BOTÓN */
button {
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    margin: 10px;
}

.open {
    background: #00c9a7;
    color: white;
}

/* FONDO OSCURO */
.modal-bg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(5px); /* desenfoque general */
    
    display: none;
    justify-content: center;
    align-items: center;
}

/* VENTANA */
.modal {
    background: rgba(255, 255, 255, 0.15); /* semi transparente */
    backdrop-filter: blur(15px); /* 🔥 DESENFOQUE */
    -webkit-backdrop-filter: blur(15px); /* compatibilidad */
    
    color: white;
    width: 90%;
    max-width: 800px;
    border-radius: 20px;
    display: flex;
    overflow: hidden;
    
    border: 1px solid rgba(255,255,255,0.3);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);

    animation: aparecer 0.3s ease;
}

/* ANIMACIÓN */
@keyframes aparecer {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

/* IZQUIERDA */
.main {
    flex: 2;
    padding: 20px;
    text-align: center;
}

/* DERECHA */
.panel {
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
    color: white;
}
/* INPUTS */
input, select {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

/* QR CARD */
.card {
    background: rgba(255, 255, 255, 0.85); /* blanco semi-transparente */
    backdrop-filter: blur(8px); /* efecto vidrio */
    -webkit-backdrop-filter: blur(8px);

    border-radius: 15px;
    padding: 15px;
    display: inline-block;
    margin-top: 10px;

    box-shadow: 0 8px 25px rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.6);
}
.title-box {
    border: 2px solid rgba(0,0,0,0.6);
    padding: 6px;
    margin-bottom: 10px;
    font-weight: bold;
    border-radius: 8px;
    background: rgba(255,255,255,0.6);
}

/* CERRAR */
.close {
    background: red;
    color: white;
    width: 100%;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    color: white;
    text-align: center;

    /* 🔥 FONDO */
    background: url("https://plus.unsplash.com/premium_photo-1701890795505-537f267ebdab?fm=jpg&q=60&w=3000&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8OXx8Zm9uZG8lMjBwYXN0ZWx8ZW58MHx8MHx8fDA%3D") no-repeat center center fixed;
    background-size: cover;
}
</style>
</head>

<body>

<h1>🚀 QR PRO SYSTEM</h1>

<button class="open" onclick="abrirModal()">Abrir Generador QR</button>

<!-- MODAL -->
<div class="modal-bg" id="modal">

<div class="modal">

<!-- IZQUIERDA -->
<div class="main">

<h3>QR Generado</h3>

<div id="qrContainer" class="card" style="display:none;">
    <div class="title-box" id="qrTitle">QR</div>
    <canvas id="qrCanvas"></canvas>
</div>

</div>

<!-- DERECHA -->
<div class="panel">

<h3>Ajustes</h3>

<input type="text" id="url" placeholder="https://ejemplo.com">
<input type="text" id="titulo" placeholder="Título del QR">

<select disabled>
    <option>⏳ En desarrollo (QR temporal)</option>
</select>

<button onclick="generarQR()">Generar</button>
<button onclick="descargarQR()">Descargar</button>
<button class="close" onclick="cerrarModal()">Cerrar</button>

</div>

</div>
</div>

<script>

function abrirModal() {
    document.getElementById("modal").style.display = "flex";
}

function cerrarModal() {
    document.getElementById("modal").style.display = "none";
}

// GENERAR QR
function generarQR() {
    let url = document.getElementById("url").value.trim();
    let titulo = document.getElementById("titulo").value.trim();

    if (!url) {
        alert("Ingresa una URL");
        return;
    }

    if (!url.startsWith("http")) {
        url = "https://" + url;
    }

    document.getElementById("qrTitle").innerText = titulo || "QR GENERADO";

    QRCode.toCanvas(document.getElementById("qrCanvas"), url);

    document.getElementById("qrContainer").style.display = "inline-block";
}

// DESCARGAR
function descargarQR() {
    const canvas = document.getElementById("qrCanvas");

    if (canvas.width === 0) {
        alert("Primero genera el QR");
        return;
    }

    const link = document.createElement("a");
    link.download = "qr_pro.png";
    link.href = canvas.toDataURL();
    link.click();
}

</script>

</body>
</html>
