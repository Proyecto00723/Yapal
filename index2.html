<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>QR Advanced Generator</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #1e1e2f;
    color: white;
    display: flex;
}

/* IZQUIERDA */
.main {
    flex: 2;
    text-align: center;
    padding: 40px;
}

/* DERECHA */
.panel {
    flex: 1;
    background: #2a2a40;
    padding: 20px;
    border-left: 2px solid #444;
}

input, select {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

.generate {
    background: #00c9a7;
}

.download {
    background: #845ec2;
}

.card {
    background: white;
    color: black;
    padding: 15px;
    border-radius: 15px;
    display: inline-block;
    margin-top: 20px;
}

/* MARCO DECORATIVO */
.title-box {
    border: 2px solid black;
    padding: 5px;
    margin-bottom: 10px;
    font-weight: bold;
}
</style>
</head>

<body>

<!-- IZQUIERDA -->
<div class="main">

<h1>🚀 QR PRO SYSTEM</h1>

<div id="qrContainer" class="card" style="display:none;">
    <div class="title-box" id="qrTitle">Título</div>
    <canvas id="qrCanvas"></canvas>
</div>

</div>

<!-- DERECHA -->
<div class="panel">

<h2>⚙️ Ajustes</h2>

<label>URL</label>
<input type="text" id="url" placeholder="https://ejemplo.com">

<label>Título del QR</label>
<input type="text" id="titulo" placeholder="Ej: Acceso VIP">

<label>Tiempo de vida</label>
<select id="tiempo">
    <option value="0">Sin límite</option>
    <option value="60">1 minuto</option>
    <option value="3600">1 hora</option>
    <option value="86400">1 día</option>
</select>

<button class="generate" onclick="generarQR()">Generar QR</button>
<button class="download" onclick="descargarQR()">Descargar</button>

</div>

<script>

let expiracion = 0;

function generarQR() {
    let url = document.getElementById("url").value.trim();
    let titulo = document.getElementById("titulo").value.trim();
    let tiempo = parseInt(document.getElementById("tiempo").value);

    if (!url) {
        alert("Ingresa una URL");
        return;
    }

    if (!url.startsWith("http")) {
        url = "https://" + url;
    }

    // Simulación de expiración (solo visual)
    expiracion = tiempo > 0 ? Date.now() + tiempo * 1000 : 0;

    document.getElementById("qrTitle").innerText = titulo || "QR GENERADO";

    QRCode.toCanvas(document.getElementById("qrCanvas"), url);

    document.getElementById("qrContainer").style.display = "inline-block";
}

// DESCARGA
function descargarQR() {
    const canvas = document.getElementById("qrCanvas");

    if (canvas.width === 0) {
        alert("Primero genera el QR");
        return;
    }

    const link = document.createElement("a");
    link.download = "qr_pro.png";
    link.href = canvas.toDataURL();
    link.click();
}

// SIMULACIÓN DE EXPIRACIÓN
setInterval(() => {
    if (expiracion && Date.now() > expiracion) {
        document.getElementById("qrContainer").style.display = "none";
        alert("Este QR ha expirado (simulado)");
        expiracion = 0;
    }
}, 1000);

</script>

</body>
</html>
